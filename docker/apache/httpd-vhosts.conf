# docker/apache/default.conf
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/www

    ProxyPassMatch "^/(.*\.php(/.*)?)$" "fcgi://php:9000/var/www/html/www/$1"

    <Directory "/var/www/html/www">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
