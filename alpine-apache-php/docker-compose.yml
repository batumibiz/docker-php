services:
  web:
    build:
      context: .docker/web
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    image: batumibiz/private:alpine3.22-apache2.4-php8.4
    restart: unless-stopped
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/localhost/htdocs
      - ./.docker/logs/apache:/var/log/apache2
      - ./.docker/logs/php:/var/log/php84
    environment:
      TZ: Europe/Tbilisi
