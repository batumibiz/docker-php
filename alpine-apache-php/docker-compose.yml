services:
  web:
    build:
      context: .docker/web
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    #image: batumibiz/private:alpine3.22-apache2.4-php8.4
    restart: unless-stopped
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Web root and PHP scripts
      - ./www:/app/www
      # Log files
      - ./.docker/log/apache:/var/log/apache2
      - ./.docker/log/php:/var/log/php84
    environment:
      TZ: Europe/Tbilisi
