<VirtualHost *:80>
    DocumentRoot /app/www
    ServerName localhost

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php84-fpm.sock|fcgi://localhost"
    </FilesMatch>

    <Directory /app/www>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    DocumentRoot /app/www
    ServerName localhost

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/localhost.crt
    SSLCertificateKeyFile /etc/ssl/private/localhost.key

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php84-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Опционально: HSTS
    # Header always set Strict-Transport-Security "max-age=31536000"

    <Directory "/app/www">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
