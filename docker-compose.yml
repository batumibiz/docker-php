services:
  apache:
    build:
      context: ./docker/apache
    ports:
      - "80:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - php

  php:
    build:
      context: ./docker/php
    volumes:
      - ./www:/var/www/html
    environment:
      USER_ID: ${USER_ID:-1000}
      GROUP_ID: ${GROUP_ID:-1000}
