services:
  apache:
    image: httpd:2.4-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./www:/var/www/html

      - ./.docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./.docker/apache/httpd-vhosts.conf:/usr/local/apache2/conf/extra/httpd-vhosts.conf

      - ./.docker/ssl/localhost.crt:/usr/local/apache2/conf/server.crt
      - ./.docker/ssl/localhost.key:/usr/local/apache2/conf/server.key
    command:
      - "httpd-foreground"
    depends_on:
      - php
      - db

  php:
    build:
      context: ./.docker/php
    restart: unless-stopped
    volumes:
      - ./www:/var/www/html:cached
    environment:
      USER_ID: ${USER_ID:-1000}
      GROUP_ID: ${GROUP_ID:-1000}

  mail:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"

  db:
    image: mariadb:lts
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      # Импорт дампа базы данных
      - ./.docker/db/dump.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_DATABASE: 'testdb'
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  db-data:
