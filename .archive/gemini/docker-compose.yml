services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # Передача UID и GID хост-пользователя во время сборки
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    image: my-alpine-web:latest
    container_name: my_alpine_web
    restart: unless-stopped
    ports:
      - "8080:80" # Хост:Контейнер
    volumes:
      # Монтирование папки с синхронизацией прав
      - ./www:/var/www/localhost/htdocs
